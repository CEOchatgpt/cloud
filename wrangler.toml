name = "instagram-bot"
main = "src/index.js"
compatibility_date = "2026-06-14"

# اتصال به دیتابیس کی-ولیو برای کش کردن سریع لینک‌ها
[[kv_namespaces]]
binding = "INDEX_KV"
id = "5ebfdb682065445d88712f8cbe10d93e"

# تعریف سیستم صف برای پردازش پس‌زمینه
[[queues.producers]]
queue = "instagram-download-queue"
binding = "DOWNLOAD_QUEUE"

[[queues.consumers]]
queue = "instagram-download-queue"
max_batch_size = 1
